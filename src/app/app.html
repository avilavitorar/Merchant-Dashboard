<div class="dashboard-container" *ngIf="!loading; else loadingTemplate">

  <div class="top-row">
    <div class="mini-card placeholder">Marcador Superior 1</div>
    <div class="mini-card placeholder">Marcador Superior 2</div>
    <div class="mini-card placeholder">Marcador Superior 3</div>
  </div>

  <div class="main-row">
    <div class="chart-card">
      <h3 class="card-title">OB Status Distribution</h3>

      <div class="card-content">
<div class="chart-wrapper">
  <apx-chart
  *ngIf="chartOptions && chartOptions.series && chartOptions.series.length > 0"
  [series]="chartOptions.series"
  [chart]="chartOptions.chart"
  [colors]="chartOptions.colors"
  [labels]="chartOptions.labels" [plotOptions]="chartOptions.plotOptions"
  [stroke]="chartOptions.stroke"
  [legend]="chartOptions.legend"
  [dataLabels]="chartOptions.dataLabels"
  [tooltip]="chartOptions.tooltip">
</apx-chart>
  <div class="center-subtext">Total</div>
</div>

        <div class="legend-wrapper">
          <ul>
            <li *ngFor="let item of processedLegend">
              <span class="bullet" [style.backgroundColor]="item.color"></span>
              <span class="label-text">
                <strong class="name">{{ item.name }}</strong>
                <span class="pct">{{ item.percentage }}%</span>
                <span class="qty">({{ item.value }})</span>
                <span class="diff" [ngClass]="{'positive': item.diff.includes('+'), 'negative': item.diff.includes('-')}">
                  {{ item.diff }}
                </span>
              </span>
            </li>
          </ul>
        </div>
      </div>

    </div>
  </div>

</div>

<ng-template #loadingTemplate>
  <div class="loading-box">Carregando dados do Dashboard...</div>
</ng-template>
